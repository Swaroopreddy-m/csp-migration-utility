<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Landing Page - Traditional HTML</title>
    
    <!-- Remote CDN Link (Should remain untouched) -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap">
    
    <!-- Local Stylesheet (Should be merged) -->
    <link rel="stylesheet" href="global.css">
    
    <!-- Missing local stylesheet (Should trigger the missing style prompt!) -->
    <link rel="stylesheet" href="missing-style.css">

    <!-- Internal Stylesheet (Should be extracted) -->
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #111119);
            color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 600px;
            width: 90%;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff007f, #7f00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn-container {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }
    </style>
</head>
<body onload="console.log('Landing page loaded! ready for interaction.');">

    <div class="container">
        <h1>Antigravity CSP Test</h1>
        <p style="color: #b0b0b0; font-size: 1.1rem; line-height: 1.6;">
            This landing page contains inline styling, internal style tags, inline event attributes, and internal scripts. It is designed to test the CSP Migration Utility!
        </p>

        <!-- Element with inline event and styling (Priority 3: No class/id -> Needs generated class) -->
        <div style="margin: 20px 0; padding: 15px; background: rgba(255,255,255,0.02); border-radius: 10px;" 
             onclick="alert('You clicked the info block!');">
            Click this card to trigger an inline event handler.
        </div>

        <div class="btn-container">
            <!-- Priority 1: Has class -> Selector should be .btn-primary -->
            <button class="btn-primary" 
                    style="background: #ff007f; color: white; border: none; padding: 12px 24px; border-radius: 30px; font-weight: 600; cursor: pointer; transition: transform 0.2s;" 
                    onclick="changeColor(this);" 
                    onmouseover="this.style.transform='scale(1.05)';" 
                    onmouseout="this.style.transform='scale(1)';">
                Primary Button
            </button>

            <!-- Priority 2: Has ID -> Selector should be #btn-secondary -->
            <button id="btn-secondary" 
                    style="background: transparent; color: #7f00ff; border: 2px solid #7f00ff; padding: 10px 22px; border-radius: 30px; font-weight: 600; cursor: pointer; transition: all 0.2s;" 
                    onclick="navigateToAbout();">
                About Page
            </button>
        </div>
    </div>

    <!-- Local Script (Should be merged) -->
    <script src="global.js"></script>

    <!-- Missing local script (Should trigger the missing script prompt!) -->
    <script src="missing-script.js"></script>

    <!-- Remote CDN Script (Should remain untouched) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- Internal Script (Should be extracted) -->
    <script>
        console.log("Internal Script loaded successfully.");
        function changeColor(element) {
            element.style.background = '#7f00ff';
            Logger.logEvent("Button background color altered locally.");
        }
    </script>
</body>
</html>
